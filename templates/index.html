<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國立中央大學無障礙地圖</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Leaflet CSS -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    />
</head>
<body>
    <div class="page">
        <header class="top-bar">
            <div class="logo-title">
                <img src="https://www.ncu.edu.tw/var/file/0/1000/img/3/233765208.jpg" alt="NCU Logo" class="school-logo">
                <h1>國立中央大學無障礙地圖 (NCU Barrier-Free Map)</h1>
            </div>
            <div class="header-right-btns">
                    <button class="header-btn" id="reportBtn">問題回報</button>
                    <button class="header-btn" id="infoBtn">說明</button>
                </div>

                <div id="modalOverlay" class="modal-overlay hidden">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h2 id="modalTitle">問題回報</h2>
                            <span id="closeModal" class="close-x">&times;</span>
                        </div>
                        
                        <div id="modalBody">
                            <form action="https://formspree.io/f/mjgjjqny" method="POST" class="report-form">
                                <div class="form-group">
                                    <label>回報者姓名 <span class="required">*</span></label>
                                    <input type="text" name="name" placeholder="請輸入姓名" required>
                                </div>
                                <div class="form-group">
                                    <label>回報者Email</label>
                                    <input type="email" name="email" placeholder="請輸入Email">
                                </div>
                                <div class="form-group">
                                    <label>內容闡述 <span class="required">*</span></label>
                                    <textarea name="message" rows="4" placeholder="請詳細描述問題" required></textarea>
                                </div>
                                <div class="form-footer">
                                    <button type="button" class="btn-cancel" id="cancelBtn">取消</button>
                                    <button type="submit" class="btn-submit">送出</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="content">
            <section class="map-section">
                <div id="map"></div>
            </section>

            <aside class="side-menu">
                <button class="menu-btn">AED</button>
                <button class="menu-btn">SOS電話</button>
                <button class="menu-btn">無障礙坡道</button>
                <button class="menu-btn">無障礙電梯</button>
            </aside>
        </main>
    </div>

    <!-- Leaflet JS -->
    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
    ></script>

    <script src="{{ url_for('static', filename='js/map.js') }}"></script>
</body>
</html>
